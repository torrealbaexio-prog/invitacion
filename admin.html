<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control Premium - Boda Dayana & Exio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4efe9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; background: #fff; padding: 30px; margin: 20px auto; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid rgba(74, 93, 36, 0.1); }
        h2, h3 { color: #4a5d24; border-bottom: 2px solid #f4efe9; padding-bottom: 10px; margin-top: 0; }
        .grid-formulario { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 600px) { .grid-formulario { grid-template-columns: 1fr; } }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 8px; color: #4a4a4a; font-size: 0.9rem; }
        input[type="text"] { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        .radio-group { display: flex; gap: 20px; margin-top: 10px; }
        .radio-option { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.95rem; }
        .btn-generar { width: 100%; padding: 14px; background-color: #4a5d24; color: white; border: none; border-radius: 6px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        .btn-generar:hover { background-color: #3d4e1e; }
        
        .resultado-box { margin-top: 25px; padding: 20px; background-color: #e8f5e9; border: 1px solid #c8e6c9; border-radius: 8px; display: none; }
        .link-generado { background: #fff; padding: 10px; border: 1px dashed #4a5d24; font-family: monospace; word-break: break-all; margin: 10px 0; display: block; }
        .btn-copiar { padding: 8px 15px; background-color: #4a5d24; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* ESTILOS DE LA TABLA DE SEGUIMIENTO */
        .seccion-tabla { margin-top: 40px; }
        .tabla-wrapper { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #e0e0e0; }
        th { background-color: #4a5d24; color: white; font-weight: 600; }
        tr:hover { background-color: #f9f7f5; }
        
        /* ESTADOS EN COLORES (SEMÁFORO) */
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
        .badge-pendiente { background-color: #ffebee; color: #c62828; }
        .badge-visto { background-color: #fffde7; color: #f57f17; }
        .badge-confirmado { background-color: #e8f5e9; color: #2e7d32; }
        
        .btn-accion { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: bold; margin-right: 5px; }
        .btn-estado { background-color: #647a3e; color: white; }
        .btn-eliminar { background-color: #e57373; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Panel de Administración & Control de Invitados</h2>
    
    <div class="grid-formulario">
        <div class="form-group">
            <label for="input-nombre">Nombre del Invitado Principal:</label>
            <input type="text" id="input-nombre" placeholder="Ej: Familia Tarazona / Sr. Juan Pérez">
        </div>
        <div class="form-group">
            <label for="input-pases">Detalle de Pases (Texto descriptivo):</label>
            <input type="text" id="input-pases" placeholder="Ej: Juan, María y Luis (3 Pases)">
        </div>
    </div>

    <div class="form-group" style="margin-bottom: 15px;">
        <label>Ubicación del Invitado:</label>
        <div class="radio-group">
            <label class="radio-option">
                <input type="radio" name="origen" value="local" checked> Local (Cúcuta)
            </label>
            <label class="radio-option">
                <input type="radio" name="origen" value="afuera"> Afuera de Cúcuta / Internacional
            </label>
        </div>
    </div>

    <button class="btn-generar" onclick="crearInvitadoYEnlace()">Generar y Registrar Invitación</button>

    <div class="resultado-box" id="resultado">
        <strong style="color: #2e7d32;">¡Invitación registrada con éxito en el sistema!</strong>
        <p>Enlace personalizado para enviar:</p>
        <span class="link-generado" id="url-resultado"></span>
        <button class="btn-copiar" onclick="copiarAlPortapapeles()">Copiar Enlace</button>
    </div>

    <div class="seccion-tabla">
        <h3>Lista de Seguimiento y Confirmaciones</h3>
        <div class="tabla-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Invitado</th>
                        <th>Pases</th>
                        <th>Tipo</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-cuerpo">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Inicializar lista desde LocalStorage o vacía si es la primera vez
    let listaInvitados = JSON.parse(localStorage.getItem('boda_invitados')) || [];

    // Renderizar la tabla al cargar la página
    document.addEventListener("DOMContentLoaded", actualizarTabla);

    function crearInvitadoYEnlace() {
        const nombre = document.getElementById('input-nombre').value.trim();
        const pases = document.getElementById('input-pases').value.trim();
        const origen = document.querySelector('input[name="origen"]:checked').value;

        if(!nombre || !pases) {
            alert("Por favor rellena todos los campos.");
            return;
        }

        // Generamos un ID único usando el tiempo actual en milisegundos
        const idUnico = "id_" + new Date().getTime();

        // NOTA IMPORTANTE PARA EXIO: 
        // Si subes el proyecto a GitHub Pages, cambia la línea de abajo por tu link real de GitHub.
        // Ejemplo: const baseUrl = "https://tuusuario.github.io/invitacion/index.html";
        const baseUrl = window.location.origin + window.location.pathname.replace('admin.html', 'index.html');
        
        // El link llevará el id único para que el index sepa quién es
        const finalUrl = `${baseUrl}?id=${idUnico}&invitado=${encodeURIComponent(nombre)}&pases=${encodeURIComponent(pases)}&tipo=${origen}`;

        // Estructura del objeto invitado
        const nuevoInvitado = {
            id: idUnico,
            nombre: nombre,
            pases: pases,
            tipo: origen,
            estado: 'enviado' // Estados posibles: 'enviado', 'visto', 'confirmado'
        };

        // Guardar en nuestro arreglo y actualizar memoria local
        listaInvitados.push(nuevoInvitado);
        localStorage.setItem('boda_invitados', JSON.stringify(listaInvitados));

        // Mostrar resultado en pantalla
        document.getElementById('url-resultado').innerText = finalUrl;
        document.getElementById('resultado').style.display = 'block';

        // Limpiar formulario y actualizar reporte gráfico
        document.getElementById('input-nombre').value = "";
        document.getElementById('input-pases').value = "";
        actualizarTabla();
    }

    function actualizarTabla() {
        const cuerpo = document.getElementById('tabla-cuerpo');
        cuerpo.innerHTML = "";

        if(listaInvitados.length === 0) {
            cuerpo.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#888;">No hay invitaciones generadas todavía.</td></tr>`;
            return;
        }

        listaInvitados.forEach((inv) => {
            let badgeClase = "badge-pendiente";
            let textoEstado = "Enviado (No visto)";
            if(inv.estado === 'visto') { badgeClase = "badge-visto"; textoEstado = "Visto"; }
            if(inv.estado === 'confirmado') { badgeClase = "badge-confirmado"; textoEstado = "Confirmado"; }

            const fila = document.createElement('tr');
            fila.innerHTML = `
                <td><strong>${inv.nombre}</strong></td>
                <td>${inv.pases}</td>
                <td>${inv.tipo === 'local' ? 'Cúcuta' : 'Afuera'}</td>
                <td><span class="badge ${badgeClase}">${textoEstado}</span></td>
                <td>
                    <button class="btn-accion btn-estado" onclick="cambiarEstado('${inv.id}', 'visto')">Visto</button>
                    <button class="btn-accion btn-estado" style="background-color:#2e7d32;" onclick="cambiarEstado('${inv.id}', 'confirmado')">Confirmar</button>
                    <button class="btn-accion btn-eliminar" onclick="eliminarInvitado('${inv.id}')">✕</button>
                </td>
            `;
            cuerpo.appendChild(fila);
        });
    }

    function cambiarEstado(id, nuevoEstado) {
        listaInvitados = listaInvitados.map(inv => {
            if(inv.id === id) inv.estado = nuevoEstado;
            return inv;
        });
        localStorage.setItem('boda_invitados', JSON.stringify(listaInvitados));
        actualizarTabla();
    }

    function eliminarInvitado(id) {
        if(confirm("¿Seguro que deseas eliminar este invitado del reporte?")) {
            listaInvitados = listaInvitados.filter(inv => inv.id !== id);
            localStorage.setItem('boda_invitados', JSON.stringify(listaInvitados));
            actualizarTabla();
        }
    }

    function copiarAlPortapapeles() {
        const enlace = document.getElementById('url-resultado').innerText;
        navigator.clipboard.writeText(enlace).then(() => {
            alert("¡Enlace copiado! Ya puedes pegarlo en WhatsApp.");
        });
    }
</script>

</body>
</html>
